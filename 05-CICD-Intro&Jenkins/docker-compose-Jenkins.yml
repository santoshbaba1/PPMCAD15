# ============================================================
# docker-compose.yml — Jenkins with Docker-in-Docker (DinD)
# ============================================================
# Usage:
#   docker compose up -d --build
#   docker compose logs -f jenkins
#   docker compose down
# ============================================================

services:
  docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    restart: unless-stopped
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins_docker_certs:/certs/client
      - jenkins_home:/var/jenkins_home
    networks:
      jenkins:
        aliases:
          - docker

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile-Jenkins
    container_name: jenkins
    restart: unless-stopped
    depends_on:
      - docker
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - jenkins_docker_certs:/certs/client:ro
    networks:
      - jenkins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  jenkins_home:
  jenkins_docker_certs:

networks:
  jenkins: